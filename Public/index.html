<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBot</title>
    <link rel="stylesheet" href="nutribot.css" />
  </head>
  <body>
    <!-- Modal de boas-vindas -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h2>👋 Bem-vindo ao NutriBot</h2>
        <p>
          Diz-nos um pouco sobre ti para personalizarmos as tuas recomendações
          nutricionais.
        </p>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="inputNome" placeholder="O teu nome" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Idade</label>
            <input
              type="number"
              id="inputIdade"
              placeholder="25"
              min="10"
              max="100"
            />
          </div>
          <div class="form-group">
            <label>Peso (kg)</label>
            <input
              type="number"
              id="inputPeso"
              placeholder="70"
              min="30"
              max="300"
            />
          </div>
          <div class="form-group">
            <label>Altura (cm)</label>
            <input
              type="number"
              id="inputAltura"
              placeholder="175"
              min="100"
              max="250"
            />
          </div>
        </div>
        <div class="form-group">
          <label>Objetivo</label>
          <select id="inputObjetivo">
            <option value="">Escolhe o teu objetivo</option>
            <option value="perder peso">Perder peso</option>
            <option value="ganhar massa muscular">Ganhar massa muscular</option>
            <option value="manutenção">Manutenção</option>
            <option value="melhorar saúde geral">Melhorar saúde geral</option>
          </select>
        </div>
        <button class="btn-primary" id="btnGuardarUser">Começar →</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <div class="logo-dot"></div>
      <h1>Nutri<span>Bot</span></h1>
      <div class="header-right">
        <span class="user-badge" id="userBadge">...</span>
        <span class="theme-label" id="themeLabel">Na paz do senhor 🙏</span>
      </div>
    </header>

    <!-- Layout principal -->
    <div class="layout">
      <!-- Chat -->
      <section class="chat-section">
        <div id="messages"></div>
        <div class="input-area">
          <textarea
            id="userInput"
            rows="1"
            placeholder="Descreve a tua refeição..."
          ></textarea>
          <button class="btn btn-mic" id="micBtn" title="Falar">🎤</button>
          <button class="btn btn-send" id="sendBtn">Enviar</button>
        </div>
      </section>

      <!-- Diário -->
      <aside class="diary-section">
        <div class="diary-header">
          Diário de Hoje
          <span class="diary-total" id="totalKcal">0 kcal</span>
        </div>
        <div id="diaryList">
          <div class="empty-diary">
            Ainda sem refeições.<br />Descreve o que comeste!
          </div>
        </div>
      </aside>
    </div>

    <script>
      // tempo máximo (ms) à espera da ia antes de desistir
      const IA_TIMEOUT_MS = 20000;

      // user logado em memória (preenchido via auto-login ou pelo modal)
      let currentUser = null;

      // tenta recuperar sessão anterior a partir do localstorage
      const savedUserId = localStorage.getItem("nutribot_user_id");
      if (savedUserId) {
        fetch(`/users/${savedUserId}`)
          .then((r) => r.json())
          .then(({ user }) => {
            if (user) {
              currentUser = user;
              // esconde o modal, mostra o nome no header
              document.getElementById("modalOverlay").classList.add("hidden");
              document.getElementById("userBadge").textContent = user.nome;
              // carrega últimas mensagens e refeições já registadas
              loadChatHistory();
              loadDiary();
            }
          })
          .catch(() => {});
      }

      // submissão do modal: cria user e guarda o id no browser
      document
        .getElementById("btnGuardarUser")
        .addEventListener("click", async () => {
          // lê e normaliza os campos do formulário
          const nome = document.getElementById("inputNome").value.trim();
          const idade = parseInt(document.getElementById("inputIdade").value);
          const peso = parseFloat(document.getElementById("inputPeso").value);
          const altura = parseFloat(
            document.getElementById("inputAltura").value,
          );
          const objetivo = document.getElementById("inputObjetivo").value;

          // validação rápida no cliente
          if (!nome || !idade || !peso || !altura || !objetivo) {
            alert("Preenche todos os campos.");
            return;
          }

          try {
            // post para o backend criar o user em sqlite
            const res = await fetch("/users", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ nome, idade, peso, altura, objetivo }),
            });
            const { user } = await res.json();
            currentUser = user;
            // persiste o id para fazer auto-login na próxima visita
            localStorage.setItem("nutribot_user_id", user.id);
            document.getElementById("modalOverlay").classList.add("hidden");
            document.getElementById("userBadge").textContent = user.nome;
            // diário ainda está vazio mas chamamos para estado consistente
            loadDiary();
          } catch (err) {
            alert("Erro ao guardar. Tenta novamente.");
          }
        });

      // ── mood ──
      // muda o tema visual e o badge consoante o humor enviado pelo backend
      function applyMood(mood) {
        const themeLabel = document.getElementById("themeLabel");
        // mapa: mood → classe css + texto a mostrar
        const map = {
          happy: { theme: "theme-happy", label: "Estás lá! 💪" },
          ok: { theme: "theme-ok", label: "Não está mauzito! 👌" },
          stressed: {
            theme: "theme-stressed",
            label: "Epa tu me digas mais nada... 😮‍💨",
          },
          angry: { theme: "theme-angry", label: "Desisto de ti. 🤦" },
        };
        const m = map[mood] ?? { theme: "", label: "neutro" };
        // aplica classe no body (muda o esquema de cores global)
        document.body.className = m.theme;
        themeLabel.className = `theme-label mood-${mood}`;
        themeLabel.textContent = m.label;
      }

      // ── converte texto simples em html com parágrafos ──
      // troca \n por <br> para preservar quebras de linha
      function renderTexto(texto) {
        return texto.replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>");
      }

      // ── speech-to-text ──
      const micBtn = document.getElementById("micBtn");
      // api de reconhecimento de voz do browser (chrome usa o prefixo webkit)
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "pt-PT";          // ditado em português de portugal
        recognition.continuous = false;      // para após a primeira frase
        recognition.interimResults = false;  // só devolve o resultado final
        recognition.onresult = (e) => {
          // mete o texto reconhecido no textarea
          document.getElementById("userInput").value =
            e.results[0][0].transcript;
          micBtn.classList.remove("active");
        };
        recognition.onend = () => micBtn.classList.remove("active");
      } else {
        // browser sem suporte → esconde o botão do microfone
        micBtn.style.display = "none";
      }

      // alterna gravação ao clicar no microfone
      micBtn.addEventListener("click", () => {
        if (!recognition) return;
        if (micBtn.classList.contains("active")) {
          recognition.stop();
          micBtn.classList.remove("active");
        } else {
          recognition.start();
          micBtn.classList.add("active");
        }
      });

      // ── chat ──
      const messagesEl = document.getElementById("messages");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      // enter envia, shift+enter mete nova linha
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn.addEventListener("click", sendMessage);

      // cria uma bolha de mensagem (user ou bot) e adiciona ao chat
      function addMessage(role, text) {
        const msg = document.createElement("div");
        msg.className = `msg ${role}`;

        // avatar: inicial do user ou emoji do bot
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent =
          role === "user" ? currentUser?.nome?.[0] || "U" : "🥗";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = renderTexto(text);

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        // faz scroll para o fim (para a nova mensagem ficar visível)
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      // cria uma bolha vazia do bot com cursor a piscar enquanto a resposta chega
      function addBotStreamBubble() {
        const msg = document.createElement("div");
        msg.className = "msg bot";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "🥗";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        // cursor visual a indicar que a resposta está a ser escrita
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        bubble.appendChild(cursor);

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return { bubble, cursor };
      }

      // ── histórico ──
      // carrega as últimas 5 mensagens e mostra-as por baixo de um separador
      async function loadChatHistory() {
        if (!currentUser) return;
        try {
          const res = await fetch(`/chat/history?user_id=${currentUser.id}`);
          const { history } = await res.json();
          if (!history || history.length === 0) return;

          // separador visual no topo do histórico
          const divider = document.createElement("div");
          divider.className = "history-divider";
          divider.textContent = "— últimas mensagens —";
          messagesEl.appendChild(divider);

          history.forEach((row) => {
            addMessage("user", row.user_message);
            // tira a linha "MOOD:..." antes de mostrar (já não é útil no histórico)
            const clean = row.ai_response.replace(
              /^MOOD:(happy|ok|stressed|angry)\n\n?/,
              "",
            );
            addMessage("bot", clean);
          });

          messagesEl.scrollTop = messagesEl.scrollHeight;
        } catch (_) {}
      }

      // ── enviar mensagem ──
      // abre o stream sse, faz parsing dos eventos e atualiza o ui em tempo real
      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        userInput.value = "";
        sendBtn.disabled = true;  // bloqueia botão durante a resposta
        addMessage("user", text);

        const { bubble, cursor } = addBotStreamBubble();
        let fullResponse = "";          // acumulador do texto da ia
        let wasToolCall = false;        // se foi tool, não chama /nutrition/parse depois
        let pendingEventType = null;    // tipo do próximo "data:" (mood, tool_action, etc.)

        // controller para abortar o stream se ultrapassar o timeout
        const controller = new AbortController();
        // reinicia o cronómetro a cada chunk recebido (timeout de inatividade)
        let timeoutId = setTimeout(() => controller.abort(), IA_TIMEOUT_MS);
        const resetTimeout = () => {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(() => controller.abort(), IA_TIMEOUT_MS);
        };

        try {
          const userId = currentUser?.id || "";
          // abre o stream — fetch normal porque eventsource não suporta query auth
          // signal permite cancelar o pedido se demorar demasiado
          const res = await fetch(
            `/chat?message=${encodeURIComponent(text)}&user_id=${userId}`,
            { signal: controller.signal },
          );
          const reader = res.body.getReader();
          const decoder = new TextDecoder();

          // lê o stream em chunks até terminar
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            // chegou actividade → reinicia o relógio do timeout
            resetTimeout();

            // bytes → texto e separa linha a linha (formato sse)
            const raw = decoder.decode(value, { stream: true });
            const lines = raw.split("\n");

            for (const line of lines) {
              // linha "event: <tipo>" indica o tipo do próximo "data:"
              if (line.startsWith("event: ")) {
                pendingEventType = line.slice(7).trim();
                continue;
              }

              if (line.startsWith("data: ")) {
                const data = line.slice(6).trim();
                if (!data) continue;

                // evento de humor → muda o tema visual
                if (pendingEventType === "mood") {
                  try {
                    applyMood(JSON.parse(data));
                  } catch (_) {}
                  pendingEventType = null;
                  continue;
                }

                // evento de erro vindo do backend (ex: chave em falta, rate-limit)
                // mostra a mensagem na própria bolha com estilo de aviso
                if (pendingEventType === "error") {
                  try {
                    const errMsg = JSON.parse(data);
                    bubble.textContent = errMsg;
                    bubble.classList.add("bubble-error");  // css opcional para estilizar a vermelho
                  } catch (_) {}
                  pendingEventType = null;
                  continue;
                }

                // evento de tool → ia eliminou refeições, atualizar o dom
                if (pendingEventType === "tool_action") {
                  wasToolCall = true;
                  try {
                    const action = JSON.parse(data);
                    if (action.action === "delete_all") {
                      // tira todos os itens e mete o placeholder vazio
                      document
                        .querySelectorAll(".diary-item")
                        .forEach((el) => el.remove());
                      const empty = document.createElement("div");
                      empty.className = "empty-diary";
                      empty.innerHTML =
                        "Ainda sem refeições.<br/>Descreve o que comeste!";
                      document.getElementById("diaryList").appendChild(empty);
                      refreshTotal();
                    } else if (action.action === "delete_one") {
                      // tenta primeiro pelo id (mais fiável)
                      let itemEl = document.querySelector(
                        `.diary-item[data-id="${action.id}"]`,
                      );
                      // fallback: procura por nome se o id não bater
                      if (!itemEl && action.deleted?.alimento) {
                        const name = action.deleted.alimento.toLowerCase();
                        document
                          .querySelectorAll(".diary-item")
                          .forEach((el) => {
                            const elName = el
                              .querySelector(".diary-item-name")
                              ?.textContent?.toLowerCase();
                            if (
                              elName &&
                              (elName.includes(name) || name.includes(elName))
                            )
                              itemEl = el;
                          });
                      }
                      if (itemEl) {
                        itemEl.remove();
                        refreshTotal();
                      }
                    } else if (action.action === "replace_one") {
                      // remove o item antigo (pelo id) e adiciona o novo
                      const oldEl = document.querySelector(
                        `.diary-item[data-id="${action.old_id}"]`,
                      );
                      if (oldEl) oldEl.remove();
                      if (action.new_entry) addDiaryItem(action.new_entry);
                      refreshTotal();
                    }
                  } catch (_) {}
                  pendingEventType = null;
                  continue;
                }

                // marcador de fim do stream
                if (data === "[DONE]") {
                  pendingEventType = null;
                  break;
                }
                pendingEventType = null;

                // chunk de texto da resposta — acumula e re-renderiza
                try {
                  const chunk = JSON.parse(data);
                  fullResponse += chunk;
                  bubble.innerHTML = renderTexto(fullResponse);
                  bubble.appendChild(cursor);  // mantém o cursor no fim
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                } catch (_) {}
              }
            }
          }

          // resposta terminada — limpa o timeout e remove o cursor piscante
          clearTimeout(timeoutId);
          cursor.remove();

          // se não foi tool e o texto parece descrição de comida, extrai macros
          if (!wasToolCall && looksLikeFood(text)) {
            await parseAndSaveFood(text);
          }
        } catch (err) {
          clearTimeout(timeoutId);
          // distingue timeout (AbortError) de outros erros de rede
          if (err.name === "AbortError") {
            bubble.textContent =
              "⏱️ A IA demorou demasiado a responder. Tenta novamente.";
            bubble.classList.add("bubble-error");
          } else {
            bubble.textContent = "Erro ao contactar o servidor.";
          }
          cursor.remove();
        }

        sendBtn.disabled = false;
      }

      // heurística simples: o texto contém alguma palavra típica de descrição de refeição?
      function looksLikeFood(text) {
        const words = [
          "comi",
          "comer",
          "almocei",
          "jantei",
          "pequeno-almoço",
          "refeição",
          "almoço",
          "jantar",
          "café",
          "snack",
          "lanche",
          "bebi",
        ];
        return words.some((w) => text.toLowerCase().includes(w));
      }

      // envia o texto ao backend que extrai macros via ia e grava no diário
      async function parseAndSaveFood(text) {
        // aqui não há stream — ou responde dentro do prazo ou aborta
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), IA_TIMEOUT_MS);

        try {
          const res = await fetch("/nutrition/parse", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, user_id: currentUser?.id || 1 }),
            signal: controller.signal,
          });
          clearTimeout(timeoutId);

          // 503 = ia indisponível (chave em falta, rate-limit, etc.)
          // avisa o user em vez de falhar em silêncio
          if (res.status === 503) {
            const { error } = await res.json().catch(() => ({}));
            addMessage("bot", error || "⚠️ Não consegui registar a refeição (IA indisponível).");
            return;
          }
          // 400 com invalid_food = alimento rejeitado pela ia (ex: "tubarão")
          // mostra ao user porque não foi adicionado ao diário
          if (res.status === 400) {
            const { error, invalid_food } = await res.json().catch(() => ({}));
            if (invalid_food) {
              addMessage("bot", `⚠️ Não posso registar isso no diário: ${error}`);
            }
            return;
          }
          if (!res.ok) return;  // outros erros — segue em silêncio
          const { entry } = await res.json();
          // adiciona ao diário no painel lateral
          if (entry) addDiaryItem(entry);
        } catch (err) {
          clearTimeout(timeoutId);
          // timeout específico → avisa o user; outros erros ficam em silêncio
          if (err.name === "AbortError") {
            addMessage(
              "bot",
              "⏱️ Não consegui registar a refeição no diário (IA demasiado lenta).",
            );
          }
        }
      }

      // apaga uma entrada manualmente (botão ✕ ao lado da refeição)
      async function deleteEntry(id, itemEl) {
        try {
          await fetch(`/nutrition/diary/${id}`, { method: "DELETE" });
          itemEl.remove();
          refreshTotal();
        } catch (_) {}
      }

      // renderiza uma refeição no painel do diário
      function addDiaryItem(entry) {
        // se ainda tinha o placeholder "ainda sem refeições", tira-o
        const emptyEl = document.querySelector(".empty-diary");
        if (emptyEl) emptyEl.remove();

        const item = document.createElement("div");
        item.className = "diary-item";
        // data-id permite localizar este elemento depois (ex. para apagar)
        if (entry.id) item.dataset.id = entry.id;

        item.innerHTML = `
        <div class="diary-item-top">
          <span class="diary-item-name">${entry.alimento}</span>
          <div style="display:flex;gap:0.4rem;align-items:center">
            <span class="diary-item-kcal">${entry.kcal} kcal</span>
            <button class="btn-delete" title="Apagar">✕</button>
          </div>
        </div>
        <div class="diary-item-macros">P: ${entry.proteina} · C: ${entry.carboidratos} · G: ${entry.gordura}</div>
      `;

        // botão ✕ apaga a entrada (na bd se tiver id, ou só no dom)
        item.querySelector(".btn-delete").addEventListener("click", () => {
          if (entry.id) deleteEntry(entry.id, item);
          else {
            item.remove();
            refreshTotal();
          }
        });

        // mais recente fica em cima
        document.getElementById("diaryList").prepend(item);
        refreshTotal();
      }

      // soma as kcal de todos os itens visíveis e atualiza o total no header do diário
      function refreshTotal() {
        let total = 0;
        document.querySelectorAll(".diary-item-kcal").forEach((el) => {
          const val = parseInt(el.textContent);
          if (!isNaN(val)) total += val;
        });
        document.getElementById("totalKcal").textContent = `${total} kcal`;
      }

      // vai buscar as refeições já registadas e mostra-as no painel lateral
      async function loadDiary() {
        if (!currentUser) return;
        try {
          const res = await fetch(`/nutrition/diary?user_id=${currentUser.id}`);
          const { entries } = await res.json();
          if (entries && entries.length > 0)
            entries.forEach((e) => addDiaryItem(e));
        } catch (_) {}
      }
    </script>
  </body>
</html>
