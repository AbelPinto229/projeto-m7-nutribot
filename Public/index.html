<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBot</title>
    <link rel="stylesheet" href="nutribot.css" />
  </head>
  <body>
    <!-- Modal de boas-vindas -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h2>👋 Bem-vindo ao NutriBot</h2>
        <p>
          Diz-nos um pouco sobre ti para personalizarmos as tuas recomendações
          nutricionais.
        </p>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="inputNome" placeholder="O teu nome" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Idade</label>
            <input
              type="number"
              id="inputIdade"
              placeholder="25"
              min="10"
              max="100"
            />
          </div>
          <div class="form-group">
            <label>Peso (kg)</label>
            <input
              type="number"
              id="inputPeso"
              placeholder="70"
              min="30"
              max="300"
            />
          </div>
          <div class="form-group">
            <label>Altura (cm)</label>
            <input
              type="number"
              id="inputAltura"
              placeholder="175"
              min="100"
              max="250"
            />
          </div>
        </div>
        <div class="form-group">
          <label>Objetivo</label>
          <select id="inputObjetivo">
            <option value="">Escolhe o teu objetivo</option>
            <option value="perder peso">Perder peso</option>
            <option value="ganhar massa muscular">Ganhar massa muscular</option>
            <option value="manutenção">Manutenção</option>
            <option value="melhorar saúde geral">Melhorar saúde geral</option>
          </select>
        </div>
        <button class="btn-primary" id="btnGuardarUser">Começar →</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <div class="logo-dot"></div>
      <h1>Nutri<span>Bot</span></h1>
      <div class="header-right">
        <span class="user-badge" id="userBadge">...</span>
        <span class="theme-label" id="themeLabel">Na paz do senhor 🙏</span>
      </div>
    </header>

    <!-- Layout principal -->
    <div class="layout">
      <!-- Chat -->
      <section class="chat-section">
        <div id="messages"></div>
        <div class="input-area">
          <textarea
            id="userInput"
            rows="1"
            placeholder="Descreve a tua refeição..."
          ></textarea>
          <button class="btn btn-mic" id="micBtn" title="Falar">🎤</button>
          <button class="btn btn-send" id="sendBtn">Enviar</button>
        </div>
      </section>

      <!-- Diário -->
      <aside class="diary-section">
        <div class="diary-header">
          Diário de Hoje
          <span class="diary-total" id="totalKcal">0 kcal</span>
        </div>
        <div id="diaryList">
          <div class="empty-diary">
            Ainda sem refeições.<br />Descreve o que comeste!
          </div>
        </div>
      </aside>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/mood.js"></script>
    <script src="js/diary.js"></script>
    <script src="js/nutrition.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/user.js"></script>
  </body>
</html>
